<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personalisation Engine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Subtle, muted palette — warm paper-dark base */
    --bg:        #16151a;
    --surface:   #1d1c22;
    --surface-2: #232228;
    --border:    #2c2b32;
    --border-soft: #262530;
    --text:      #e6e3dc;
    --text-2:    #9b988f;
    --text-3:    #6a6860;
    --accent:    #b8a888;   /* soft champagne */

    /* Dimension accents — all desaturated, low-chroma */
    --c-credit:  #c2897a;   /* dusty terracotta */
    --c-age:     #a89a7c;   /* sand */
    --c-gender:  #8a9aa6;   /* slate blue-grey */
    --c-loc:     #9aa68a;   /* sage */
    --c-tier:    #a294ad;   /* muted lavender */

    --good: #8faa8b;
    --warn: #c2a878;
    --risk: #c2897a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  /* ── TOP BAR ── */
  .topbar {
    height: 64px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    position: sticky;
    top: 0;
    background: rgba(22,21,26,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 40px; height: 40px; border-radius: 11px;
    background: linear-gradient(145deg, #5a5048, #3a342e);
    border: 1px solid #4a443c;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px;
    color: var(--accent);
  }
  .brand-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; letter-spacing: 0.01em; }
  .brand-sub { font-size: 10px; color: var(--text-3); letter-spacing: 0.22em; text-transform: uppercase; margin-top: 2px; }

  .nav { display: flex; gap: 4px; }
  .nav button {
    padding: 8px 18px; border-radius: 8px; border: none; background: transparent;
    color: var(--text-3); font-size: 13px; font-weight: 400; letter-spacing: 0.02em;
    transition: all 0.18s;
  }
  .nav button:hover { color: var(--text-2); }
  .nav button.active { background: var(--surface-2); color: var(--text); }

  .counter { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-3); letter-spacing: 0.05em; }

  /* ── LAYOUT ── */
  .layout { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 64px); }

  /* ── SIDEBAR ── */
  .sidebar { border-right: 1px solid var(--border-soft); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-filters { padding: 20px 18px; overflow-y: auto; }

  .search {
    width: 100%; padding: 11px 14px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 13px; outline: none; margin-bottom: 20px;
    transition: border-color 0.18s;
  }
  .search::placeholder { color: var(--text-3); }
  .search:focus { border-color: #3d3c44; }

  .filter-group { margin-bottom: 16px; }
  .filter-group:last-child { margin-bottom: 0; }
  .filter-label { font-size: 9.5px; color: var(--text-3); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 9px; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    padding: 5px 11px; border-radius: 7px; border: 1px solid var(--border);
    background: transparent; font-size: 11.5px; font-weight: 400; letter-spacing: 0.01em;
    transition: all 0.16s; color: var(--text-2);
  }
  .chip:hover { border-color: #3a3941; color: var(--text); }
  .chip.active { font-weight: 500; }

  /* ── COMBO LIST ── */
  .combo-list { flex: 1; overflow-y: auto; padding: 8px; }
  .combo {
    padding: 10px 12px; border-radius: 9px; cursor: pointer; margin-bottom: 3px;
    transition: background 0.14s; border: 1px solid transparent;
  }
  .combo:hover { background: var(--surface); }
  .combo.active { background: var(--surface-2); border-color: var(--border); }
  .combo-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .combo-code { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: 0.02em; }
  .combo-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.04em; }
  .combo-meta { font-size: 11px; color: var(--text-3); display: flex; gap: 5px; align-items: center; }
  .combo-bar { height: 2px; background: var(--border); border-radius: 99px; margin-top: 7px; overflow: hidden; }
  .combo-bar > div { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

  .combo-count {
    padding: 11px 18px; font-size: 11px; color: var(--text-3);
    border-top: 1px solid var(--border-soft); letter-spacing: 0.05em;
  }

  /* ── DETAIL ── */
  .detail { overflow-y: auto; padding: 30px 36px; }

  .detail-header { padding-bottom: 24px; border-bottom: 1px solid var(--border-soft); margin-bottom: 24px; }
  .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .code-display { font-family: 'Fraunces', serif; font-size: 27px; font-weight: 600; letter-spacing: 0.01em; margin-bottom: 10px; line-height: 1.15; }
  .persona-name { font-size: 16px; color: var(--text-2); font-weight: 300; margin-bottom: 14px; }

  .tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .dtag {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    padding: 5px 11px; border-radius: 6px; letter-spacing: 0.02em;
    border: 1px solid; background: transparent;
  }

  .score-display { text-align: right; flex-shrink: 0; }
  .score-num { font-family: 'Fraunces', serif; font-weight: 600; font-size: 54px; line-height: 0.9; color: var(--accent); }
  .score-label { font-size: 9.5px; color: var(--text-3); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 6px; }

  /* ── PANELS GRID ── */
  .main-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-bottom: 16px; }

  .panel {
    background: var(--surface); border: 1px solid var(--border-soft);
    border-radius: 14px; padding: 22px 24px;
  }
  .panel-label { font-size: 9.5px; color: var(--text-3); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 18px; }

  .score-line { display: flex; align-items: center; gap: 14px; margin-bottom: 15px; }
  .score-line:last-child { margin-bottom: 0; }
  .score-line-label { font-size: 12px; color: var(--text-2); width: 72px; letter-spacing: 0.04em; }
  .score-track { flex: 1; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 99px; transition: width 0.7s ease; }
  .score-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; width: 24px; text-align: right; }

  .stack { display: flex; flex-direction: column; gap: 14px; }
  .mini-panel {
    background: var(--surface); border: 1px solid var(--border-soft);
    border-radius: 14px; padding: 16px 20px;
  }
  .mini-label { font-size: 9.5px; color: var(--text-3); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 7px; }
  .mini-value { font-size: 14px; font-weight: 400; }
  .mini-value.profile { font-size: 13px; line-height: 1.6; color: var(--text-2); }

  /* ── DIMENSION CONTEXT ── */
  .dim-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .dim-card {
    background: var(--surface); border: 1px solid var(--border-soft);
    border-radius: 13px; padding: 18px 18px;
  }
  .dim-card-label { font-size: 9.5px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 9px; font-weight: 500; }
  .dim-card-value { font-family: 'Fraunces', serif; font-size: 21px; font-weight: 600; margin-bottom: 10px; }
  .dim-card-note { font-size: 11.5px; color: var(--text-3); line-height: 1.6; }

  /* ── CATEGORIES ── */
  .cat-section-label { font-size: 9.5px; color: var(--text-3); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 16px; }
  .cat-tabs { display: flex; gap: 9px; flex-wrap: wrap; margin-bottom: 18px; }
  .cat-tab {
    padding: 9px 18px; border-radius: 9px; border: 1px solid var(--border);
    background: transparent; font-size: 13px; font-weight: 400; color: var(--text-2);
    transition: all 0.15s;
  }
  .cat-tab:hover { border-color: #3a3941; color: var(--text); }
  .cat-tab.active { background: var(--surface-2); color: var(--text); border-color: var(--border); font-weight: 500; }

  .cat-detail {
    background: var(--surface); border: 1px solid var(--border-soft);
    border-radius: 16px; padding: 28px 30px;
  }
  .cat-detail-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .cat-title { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; margin-bottom: 12px; }
  .cat-pills { display: flex; gap: 8px; }
  .cat-pill {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    padding: 5px 12px; border-radius: 6px; border: 1px solid; background: transparent;
  }
  .cat-emi { display: flex; gap: 24px; }
  .cat-emi-item { text-align: right; }
  .cat-emi-label { font-size: 9.5px; color: var(--text-3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
  .cat-emi-val { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }

  .brands { display: flex; flex-wrap: wrap; gap: 10px; }
  .brand {
    padding: 11px 18px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface-2); font-size: 13px; color: var(--text); font-weight: 400;
    transition: border-color 0.15s;
  }
  .brand:hover { border-color: #3d3c44; }

  /* ── CATEGORIES + BAND SIDE BY SIDE ── */
  .cat-band-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: stretch; margin-bottom: 4px; }
  .cat-col, .band-col { min-width: 0; display: flex; flex-direction: column; }
  .cat-col .cat-detail, .band-col .band-explainer { flex: 1; }

  /* ── CREDIT BAND × CATEGORIES EXPLAINER ── */
  .band-explainer {
    background: var(--surface); border: 1px solid var(--border-soft);
    border-radius: 16px; padding: 20px 22px;
  }
  .band-explainer-intro {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 0 0 16px 14px; border-left: 2px solid; margin-bottom: 16px;
  }
  .band-tier-pill {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    padding: 4px 11px; border-radius: 6px; border: 1px solid; background: transparent;
    flex-shrink: 0; white-space: nowrap;
  }
  .band-explainer-text { font-size: 12.5px; color: var(--text-2); line-height: 1.7; }

  .band-table { display: flex; flex-direction: column; }
  .band-th, .band-tr {
    display: grid; grid-template-columns: 1.8fr 1fr 1.4fr;
    gap: 10px; align-items: center; padding: 11px 10px;
  }
  .band-th {
    font-size: 9.5px; color: var(--text-3); letter-spacing: 0.12em; text-transform: uppercase;
    border-bottom: 1px solid var(--border-soft);
  }
  .band-tr { border-bottom: 1px solid var(--border-soft); transition: background 0.14s; }
  .band-tr:last-child { border-bottom: none; }
  .band-tr:hover { background: var(--surface-2); border-radius: 8px; }
  .band-cat { font-size: 12px; color: var(--text); font-weight: 400; }
  .band-tier-mini { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }
  .band-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-2); }

  /* Stack on narrower widths */
  @media (max-width: 1080px) {
    .cat-band-row { grid-template-columns: 1fr; }
  }

  /* ── GRID VIEW ── */
  .gridview { padding: 30px 36px; }
  .grid-credit-block { margin-bottom: 30px; }
  .grid-credit-head { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }
  .grid-credit-dot { width: 9px; height: 9px; border-radius: 99px; }
  .grid-credit-title { font-size: 13px; font-weight: 500; letter-spacing: 0.03em; }
  .grid-matrix { display: grid; grid-template-columns: 150px repeat(4, 1fr); gap: 6px; }
  .grid-head-cell {
    padding: 9px 12px; border-radius: 8px; background: var(--surface);
    text-align: center; border: 1px solid var(--border-soft);
  }
  .grid-head-cell .gh-sym { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
  .grid-head-cell .gh-label { font-size: 10px; color: var(--text-3); margin-top: 2px; }
  .grid-row-label {
    padding: 9px 12px; border-radius: 8px; background: var(--surface);
    border: 1px solid var(--border-soft); display: flex; align-items: center; gap: 8px;
  }
  .grid-cell {
    padding: 11px 12px; border-radius: 8px; background: var(--surface);
    border: 1px solid var(--border-soft); cursor: pointer; text-align: left;
    transition: all 0.14s;
  }
  .grid-cell:hover { border-color: var(--border); background: var(--surface-2); }
  .grid-cell.active { border-color: var(--accent); }
  .grid-cell-code { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; margin-bottom: 4px; }
  .grid-cell-cat { font-size: 10px; color: var(--text-3); line-height: 1.4; margin-bottom: 6px; height: 26px; overflow: hidden; }
  .grid-cell-bar { height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .grid-cell-bar > div { height: 100%; }

  /* ── ALGORITHM VIEW ── */
  .algoview { max-width: 920px; margin: 0 auto; padding: 36px 32px; }
  .algo-title { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 600; margin-bottom: 10px; }
  .algo-intro { font-size: 13px; color: var(--text-2); line-height: 1.9; margin-bottom: 32px; max-width: 680px; }
  .algo-table { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 14px; overflow: hidden; margin-bottom: 24px; }
  .algo-table-head { padding: 15px 20px; border-bottom: 1px solid var(--border-soft); font-size: 9.5px; color: var(--text-3); letter-spacing: 0.15em; text-transform: uppercase; }
  .algo-section-head { padding: 13px 20px; background: var(--surface-2); display: flex; justify-content: space-between; align-items: center; }
  .algo-section-head .ash-left { display: flex; align-items: center; gap: 11px; }
  .algo-section-bar { width: 3px; height: 16px; border-radius: 99px; }
  .algo-section-name { font-size: 12px; font-weight: 500; }
  .algo-section-key { font-size: 9px; color: var(--text-3); letter-spacing: 0.1em; }
  .algo-section-max { font-size: 11px; font-weight: 500; color: var(--text-3); }
  .algo-row { display: flex; align-items: center; gap: 16px; padding: 9px 20px; border-bottom: 1px solid var(--border-soft); }
  .algo-row:last-child { border-bottom: none; }
  .algo-row-k { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-2); width: 200px; flex-shrink: 0; }
  .algo-row-track { width: 40px; height: 3px; background: var(--border); border-radius: 99px; flex-shrink: 0; overflow: hidden; }
  .algo-row-v { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; width: 28px; flex-shrink: 0; }
  .algo-row-note { font-size: 11px; color: var(--text-3); line-height: 1.5; }
  .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 11px; }
  .stat-card { padding: 18px 16px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border-soft); text-align: center; }
  .stat-num { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; color: var(--text); }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text-2); margin: 5px 0 2px; }
  .stat-sub { font-size: 10px; color: var(--text-3); }

  /* ── SIDEBAR INTRO ── */
  .sidebar-intro { margin-bottom: 22px; }
  .sidebar-intro-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
  .sidebar-intro-title { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 600; }
  .sidebar-intro-sub { font-size: 11.5px; color: var(--text-3); line-height: 1.6; }
  .fl-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 15px; height: 15px; border-radius: 5px; background: var(--surface-2);
    color: var(--text-3); font-size: 9px; font-weight: 600; margin-right: 6px;
    font-family: 'DM Mono', monospace; vertical-align: middle;
    transition: all 0.2s;
  }
  .filter-group.done .fl-num { background: var(--accent); color: var(--bg); }

  /* ── SIDEBAR FOOTER / PROGRESS ── */
  .sidebar-footer {
    margin-top: auto; padding: 16px 18px; border-top: 1px solid var(--border-soft);
    display: flex; align-items: center; justify-content: space-between;
  }
  .progress-wrap { display: flex; align-items: center; gap: 11px; }
  .progress-dots { display: flex; gap: 5px; }
  .progress-dot { width: 7px; height: 7px; border-radius: 99px; background: var(--border); transition: all 0.3s; }
  .progress-dot.filled { background: var(--accent); }
  .progress-label { font-size: 11px; color: var(--text-3); letter-spacing: 0.03em; }
  .reset-btn {
    padding: 6px 13px; border-radius: 7px; border: 1px solid var(--border);
    background: transparent; color: var(--text-2); font-size: 11px; letter-spacing: 0.03em;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #3a3941; color: var(--text); }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 70vh; text-align: center; padding: 40px;
  }
  .empty-mark {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500;
    color: var(--border); margin-bottom: 26px; user-select: none;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center;
  }
  .empty-mark .slot { color: var(--text-3); transition: color 0.3s; }
  .empty-mark .slot.filled { color: var(--accent); }
  .empty-mark .mark-sep { color: var(--border); font-size: 14px; }
  .empty-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; margin-bottom: 12px; }
  .empty-sub { font-size: 13px; color: var(--text-3); line-height: 1.8; max-width: 380px; margin-bottom: 28px; }
  .empty-chips { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .empty-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border-soft);
    background: var(--surface); font-size: 12px; color: var(--text-3);
    transition: all 0.25s;
  }
  .empty-chip.filled { border-color: var(--border); color: var(--text); }
  .empty-chip .ec-dot { width: 7px; height: 7px; border-radius: 99px; background: var(--border); transition: background 0.25s; }
  .empty-chip.filled .ec-dot { }

  .fade { animation: fade 0.35s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div>
      <div class="brand-title">Personalisation Engine</div>
    </div>
  </div>
  <div class="nav">
    <button data-view="explorer" class="active">Explorer</button>
    <button data-view="grid">Grid View</button>
    <button data-view="algorithm">Algorithm</button>
  </div>
  <div class="counter" id="counter">1 / 240</div>
</div>

<!-- EXPLORER -->
<div class="layout" id="view-explorer">
  <div class="sidebar">
    <div class="sidebar-filters">
      <div class="sidebar-intro">
        <div class="sidebar-intro-head">
          <div class="sidebar-intro-title">Build the archetype</div>
          <button class="reset-btn hidden" id="reset-btn">Reset</button>
        </div>
        <div class="sidebar-intro-sub">Select all four dimensions to reveal the matching persona and its recommendations.</div>
      </div>
      <div class="filter-group"><div class="filter-label"><span class="fl-num">1</span> Credit Band</div><div class="chips" id="f-cv"></div></div>
      <div class="filter-group"><div class="filter-label"><span class="fl-num">2</span> Age Band</div><div class="chips" id="f-ca"></div></div>
      <div class="filter-group"><div class="filter-label"><span class="fl-num">3</span> Gender</div><div class="chips" id="f-cg"></div></div>
      <div class="filter-group"><div class="filter-label"><span class="fl-num">4</span> Location</div><div class="chips" id="f-cl"></div></div>
    </div>
    <div class="sidebar-footer" id="sidebar-footer">
      <div class="progress-wrap">
        <div class="progress-dots" id="progress-dots"></div>
        <div class="progress-label" id="progress-label">0 of 4 selected</div>
      </div>

function computeScore(cv,ca,cg,cl){
  const cs={v:8,w:18,x:28,y:36,z:40}[cv]||0;
  const as={a:14,b:25,c:22,d:10}[ca]||0;
  const ls={"@":20,"#":16,"&":10,"%":5}[cl]||0;
  const gs={1:10,2:8,3:9}[cg]||0;

  else if((cv==="v"||cv==="w")&&cl==="%")bonus=-3;

  const tier=t>=80?"PREMIUM":t>=65?"ESTABLISHED":t>=50?"DEVELOPING":t>=35?"EMERGING":"STARTER";

}

function renderFilters(){
  const apply=(id,active,groupSel)=>{
    document.querySelectorAll(`#${id} .chip`).forEach(b=>{
      const on=b.dataset.k===active;
      b.classList.toggle("active",on);
      if(on){ b.style.background=b.dataset.color+"22"; b.style.borderColor=b.dataset.color+"55"; b.style.color=b.dataset.color; }
      else { b.style.background=""; b.style.borderColor=""; b.style.color=""; }
    });
    // mark group as done
    const grp=document.getElementById(id).closest(".filter-group");
    if(grp) grp.classList.toggle("done",!!active);
  };
  apply("f-cv",fCV); apply("f-ca",fCA); apply("f-cg",fCG); apply("f-cl",fCL);
}

// Central sync: updates progress, decides empty vs archetype
function syncSelection(){
  const count=selectedCount();

  // progress dots
  const dots=document.getElementById("progress-dots");
  dots.innerHTML=[fCV,fCA,fCG,fCL].map(v=>`<div class="progress-dot ${v?"filled":""}"></div>`).join("");
  document.getElementById("progress-label").textContent=`${count} of 4 selected`;
  document.getElementById("reset-btn").classList.toggle("hidden",count===0);

  if(allSelected()){
    activeRaw=`${fCV}${fCA}${fCG}${fCL}`;
    document.getElementById("counter").textContent=ALL.find(c=>c.raw===activeRaw).name;
    renderDetail();
  } else {
    activeRaw=null;
    document.getElementById("counter").textContent=`${count} / 4`;
    renderEmptyState();
  }
}

function renderEmptyState(){
  const d=document.getElementById("detail");
  d.className="detail";
  const slot=(v,obj,fallback)=>`<span class="slot ${v?"filled":""}">${v?(obj[v].tag||obj[v].label):fallback}</span>`;
  const chip=(label,v,obj)=>`<div class="empty-chip ${v?"filled":""}"><span class="ec-dot" style="${v?`background:${obj[v].color}`:""}"></span>${v?`${label}: ${obj[v].tag||obj[v].label}`:label}</div>`;
  d.innerHTML=`
    <div class="empty-state fade">
      <div class="empty-mark">${slot(fCV,CREDIT,"Credit")}<span class="mark-sep">·</span>${slot(fCA,AGE,"Age")}<span class="mark-sep">·</span>${slot(fCG,GENDER,"Gender")}<span class="mark-sep">·</span>${slot(fCL,LOC,"Location")}</div>
      <div class="empty-title">${selectedCount()===0?"Select the dimensions":"Keep going…"}</div>
      <div class="empty-sub">${selectedCount()===0
        ? "Choose a Credit Band, Age, Gender, and Location from the left. The matching archetype and its category and brand recommendations will appear here."
        : `${4-selectedCount()} more to go. The archetype reveals once all four dimensions are set.`}</div>
      <div class="empty-chips">
        ${chip("Credit",fCV,CREDIT)}
        ${chip("Age",fCA,AGE)}
        ${chip("Gender",fCG,GENDER)}
        ${chip("Location",fCL,LOC)}
      </div>
    </div>`;
}

function resetSelection(){
  fCV=fCA=fCG=fCL=null; activeRaw=null; activeCat=0;
  renderFilters(); syncSelection();
}

function renderDetail(){
  const c=ALL.find(x=>x.raw===activeRaw); if(!c)return;
  const cr=CREDIT[c.cv],ag=AGE[c.ca],gn=GENDER[c.cg],lo=LOC[c.cl],sc=c.score;
  const tc=tierColor(sc.tier);
  const riskColor=cr.riskBand==="High"?"var(--risk)":cr.riskBand.startsWith("Low")?"var(--good)":"var(--warn)";

  const d=document.getElementById("detail");
  d.className="detail fade";
  d.innerHTML=`
    <div class="detail-header">
      <div class="header-row">
        <div>
          <div class="code-display">${c.name}</div>
          <div class="tags">
            <span class="dtag" style="color:${cr.color};border-color:${cr.color}44">${cr.label} Credit</span>
            <span class="dtag" style="color:${ag.color};border-color:${ag.color}44">${ag.label} · ${ag.tag}</span>
            <span class="dtag" style="color:${gn.color};border-color:${gn.color}44">${gn.sym} ${gn.label}</span>
            <span class="dtag" style="color:${lo.color};border-color:${lo.color}44">${c.cl} ${lo.label}</span>
            <span class="dtag" style="color:${tc};border-color:${tc}44">${sc.tier}</span>
          </div>
        </div>
        <div class="score-display">
          <div class="score-num">${sc.total}</div>
          <div class="score-label">Composite / 100</div>
        </div>
      </div>
    </div>

    <div class="cat-section-label">Predicted Categories &amp; Curated Brands</div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="cat-detail" id="cat-detail"></div>

    <div class="main-grid" style="margin-top:16px;">
      <div class="panel">
        <div class="panel-label">Score Breakdown</div>
        ${scoreLine("Credit",sc.cs,40,cr.color)}
        ${scoreLine("Age",sc.as,25,ag.color)}
        ${scoreLine("Location",sc.ls,20,lo.color)}
        ${scoreLine("Gender",sc.gs,10,gn.color)}
        ${sc.bonus!==0?scoreLine(sc.bonus>0?"Bonus":"Penalty",Math.abs(sc.bonus),5,sc.bonus>0?"var(--good)":"var(--risk)"):""}
      </div>
      <div class="stack">
        <div class="mini-panel">
          <div class="mini-label">Credit Profile</div>
          <div class="mini-value profile">${cr.profile}</div>
        </div>
        <div class="mini-panel">
          <div class="mini-label">EMI Style</div>
          <div class="mini-value" style="color:${cr.color}">${cr.emiStyle}</div>
        </div>
        <div class="mini-panel">
          <div class="mini-label">Risk Band</div>
          <div class="mini-value" style="color:${riskColor}">${cr.riskBand}</div>
        </div>
        <div class="mini-panel">
          <div class="mini-label">Max Utilisation</div>
          <div class="mini-value" style="color:var(--good)">${cr.utilizationMax}</div>
        </div>
      </div>
    </div>

    <div class="dim-grid" style="margin-top:16px;">
      ${dimCard("Credit",cr.label,cr.color,cr.profile.slice(0,90)+"…")}
      ${dimCard("Age",ag.label,ag.color,ag.insight)}
      ${dimCard("Gender",gn.sym+" "+gn.label.replace("Non-binary","NB"),gn.color,gn.spend)}
      ${dimCard("Location",c.cl+" "+lo.label,lo.color,lo.note)}
    </div>
  `;

  const tabs=document.getElementById("cat-tabs");
  c.cats.forEach((cat,i)=>{
    const b=document.createElement("button");
    b.className="cat-tab"+(i===activeCat?" active":"");
    b.textContent=`${i+1}. ${cat}`;
    b.onclick=()=>{ activeCat=i; document.querySelectorAll(".cat-tab").forEach((x,j)=>x.classList.toggle("active",j===i)); renderCat(c); };
    tabs.appendChild(b);
  });
  renderCat(c);
}

function scoreLine(label,val,max,color){
  return `<div class="score-line">
    <span class="score-line-label">${label}</span>
    <div class="score-track"><div class="score-fill" style="width:${Math.round((val/max)*100)}%;background:${color}"></div></div>
    <span class="score-val" style="color:${color}">${val}</span>
  </div>`;
}

function dimCard(label,value,color,note){
  return `<div class="dim-card">
    <div class="dim-card-label" style="color:${color}">${label}</div>
    <div class="dim-card-value">${value}</div>
    <div class="dim-card-note">${note}</div>
  </div>`;
}

function renderCat(c){
  const cat=c.cats[activeCat];
  const brands=getBrands(cat,c.cv);
  const cr=CREDIT[c.cv];
  const tierLabel=TIER_LABEL[c.cv];
  const e=getEMI(c.cv,cat);

  document.getElementById("cat-detail").innerHTML=`
    <div class="cat-detail-head">
      <div>
        <div class="cat-title">${cat}</div>
        <div class="cat-pills">
          <span class="cat-pill" style="color:${cr.color};border-color:${cr.color}44">${tierLabel}</span>
          <span class="cat-pill" style="color:var(--accent);border-color:#4a443c">Max ₹${e.maxTicket.toLocaleString()}</span>
        </div>
      </div>
      <div class="cat-emi">
        <div class="cat-emi-item">
          <div class="cat-emi-label">Recommended EMI</div>
          <div class="cat-emi-val" style="color:${cr.color}">₹${e.monthly.toLocaleString()}/mo · ${e.tenure}M</div>
        </div>
      </div>
    </div>
    <div class="brands">
      ${brands.map(b=>`<span class="brand">${b}</span>`).join("")}
    </div>
  `;
}

/* ── GRID VIEW ── */
function renderGrid(){
  const g=document.getElementById("view-grid");
  let html=`<div style="display:flex;align-items:center;gap:14px;margin-bottom:22px;">
    <div style="font-family:'Fraunces',serif;font-size:24px;font-weight:600;">240-Cell Matrix</div>
    <div style="font-size:12px;color:var(--text-3);">Credit blocks · Age×Gender rows · Location columns · Click any cell</div>
  </div>`;
  ALL_CV.forEach(cv=>{
    const cr=CREDIT[cv];
    html+=`<div class="grid-credit-block">
      <div class="grid-credit-head">
        <div class="grid-credit-dot" style="background:${cr.color}"></div>
        <div class="grid-credit-title" style="color:${cr.color}">${cr.label} · ${cr.tag} Credit</div>
      </div>
      <div class="grid-matrix">
        <div></div>
        ${ALL_CL.map(cl=>`<div class="grid-head-cell"><div class="gh-label" style="color:${LOC[cl].color};font-size:12px;font-weight:500">${LOC[cl].label}</div></div>`).join("")}
        ${ALL_CA.map(ca=>ALL_CG.map(cg=>{
          let row=`<div class="grid-row-label">
            <div style="width:6px;height:6px;border-radius:99px;background:${AGE[ca].color};flex-shrink:0"></div>
            <div><div style="font-size:11px;font-weight:500;color:var(--text-2)">${AGE[ca].tag}</div>
            <div style="font-size:9px;color:var(--text-3)">${GENDER[cg].label}</div></div>
          </div>`;
          row+=ALL_CL.map(cl=>{
            const c=ALL.find(x=>x.cv===cv&&x.ca===ca&&x.cg===cg&&x.cl===cl);
            const act=c.raw===activeRaw?" active":"";
            return `<button class="grid-cell${act}" data-raw="${c.raw}">
              <div class="grid-cell-code" style="color:${cr.color}">${AGE[ca].tag} ${GENDER[cg].label}</div>
              <div class="grid-cell-cat">${c.cats[0]}</div>
              <div class="grid-cell-bar"><div style="width:${c.score.total}%;background:${cr.color};opacity:0.7"></div></div>
            </button>`;
          }).join("");
          return row;
        }).join("")).join("")}
      </div>
    </div>`;
  });
  g.innerHTML=html;
  g.querySelectorAll(".grid-cell").forEach(cell=>{
    cell.onclick=()=>{
      const raw=cell.dataset.raw;
      fCV=raw[0]; fCA=raw[1]; fCG=raw[2]; fCL=raw[3]; activeCat=0;
      renderFilters(); syncSelection(); switchView("explorer");
    };
  });
}

/* ── ALGORITHM VIEW ── */
function renderAlgo(){
  const a=document.getElementById("view-algorithm");
  const sections=[
    {dim:"Credit Band",max:40,color:CREDIT.v.color,key:"PRIMARY DRIVER",rows:[
      {k:"Starter · ₹3K–15K",v:8,note:"BNPL entry; zero-bureau. LazyPay/Freo avg limit ₹10K (PwC 2024)"},
      {k:"Emerging · ₹15K–30K",v:18,note:"Thin-file builder; Home Credit / NBFC EMI card primary"},
      {k:"Developing · ₹30K–45K",v:28,note:"Mid-segment; ICICI/SBI card; utilisation 30–50% healthy (CIBIL 2024)"},
      {k:"Established · ₹45K–60K",v:36,note:"Stable professional; reward-seeking; 30–35 most savvy (SaveSage 2025)"},
      {k:"Premium · ₹60K+",v:40,note:"Affluent / HNI; Amex/HDFC Infinia; ₹2.17T monthly high (RBI Sep 2025)"}]},
    {dim:"Age Band",max:25,color:AGE.a.color,key:"LIFE-STAGE PROXY",rows:[
      {k:"Gen Z · 20–28",v:14,note:"40% India e-retail; BNPL-curious; new-to-credit (Bain 2025)"},
      {k:"Millennial · 29–44",v:25,note:"Peak earner; 74% impulse buy; 69% app-banking (Home Credit 2024)"},
      {k:"Gen X · 45–60",v:22,note:"Highest EMI capacity; durable loan leader; 58% app-banking"},
      {k:"Boomer · 61–79",v:10,note:"Conservative; trust-first; fixed income; short tenure only"}]},
    {dim:"Location Tier",max:20,color:LOC["@"].color,key:"DIGITAL CREDIT MATURITY",rows:[
      {k:"Metro",v:20,note:"60%+ card spend is e-commerce; highest credit density (RBI FY26)"},
      {k:"Tier 1",v:16,note:"Embedded finance 52–68% interest (Home Credit 2024); mirrors metro"},
      {k:"Tier 2",v:10,note:"UPI-QR credit card rising; basket ₹72 > metro ₹60 (PCMI 2024)"},
      {k:"Tier 3",v:5,note:"BNPL entry market; 67% e-comm demand from Tier 2+ (Unicommerce 2024)"}]},
    {dim:"Gender",max:10,color:GENDER[2].color,key:"BASKET COMPOSITION",rows:[
      {k:"Male",v:10,note:"Higher formal credit access; Electronics 32% basket (Statista 2024)"},
      {k:"Female",v:8,note:"Fashion 38%+Beauty 22%; strong repayment; underserved (Indian Retailer 2025)"},
      {k:"Non-binary",v:9,note:"Metro-skewed; digital-native; Wellness+Fashion blend (NIQ 2024)"}]},
    {dim:"Interaction Bonus",max:5,color:"var(--good)",key:"COMBINATION EFFECT",rows:[
      {k:"High credit + Young + Metro",v:5,note:"Tech-savvy premium urban — highest LTV segment"},
      {k:"Low credit + Tier 3",v:-3,note:"Penalty: limited digital infra + low credit = constrained basket"}]},
  ];

  let html=`<div class="algo-title">5D Scoring Algorithm</div>
    <p class="algo-intro">How five dimensions — Credit Band, Age, Gender, Location, and their Interaction — combine into 240 uniquely scored consumer profiles. Credit is the primary driver; it unlocks product tiers. The other four refine which category and brand within that tier.</p>
    <div class="algo-table">
      <div class="algo-table-head">Scoring Model · Max 100 Points</div>`;
  sections.forEach(s=>{
    html+=`<div class="algo-section-head">
      <div class="ash-left">
        <div class="algo-section-bar" style="background:${s.color}"></div>
        <div class="algo-section-name" style="color:${s.color}">${s.dim}</div>
        <div class="algo-section-key">${s.key}</div>
      </div>
      <div class="algo-section-max">/${s.max} pts</div>
    </div>`;
    s.rows.forEach(r=>{
      html+=`<div class="algo-row">
        <div class="algo-row-k">${r.k}</div>
        <div class="algo-row-track"><div style="height:100%;border-radius:99px;background:${s.color};width:${Math.round((Math.abs(r.v)/s.max)*100)}%"></div></div>
        <div class="algo-row-v" style="color:${s.color}">${r.v>0?"+":""}${r.v}</div>
        <div class="algo-row-note">${r.note}</div>
      </div>`;
    });
  });
  html+=`</div>
    <div class="stats-grid">
      ${[["240","Combinations","5×4×3×4"],["960","Category Slots","4 per combo"],["3,840","Brand Mappings","~4 per category"],["48","Category Lists","Age×Gender pairs"],["13+","Research Sources","RBI, PwC, Bain…"]].map(s=>`<div class="stat-card"><div class="stat-num">${s[0]}</div><div class="stat-label">${s[1]}</div><div class="stat-sub">${s[2]}</div></div>`).join("")}
    </div>`;
  a.innerHTML=html;
}

/* ── VIEW SWITCHING ── */
function switchView(view){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===view));
  document.getElementById("view-explorer").classList.toggle("hidden",view!=="explorer");
  document.getElementById("view-grid").classList.toggle("hidden",view!=="grid");
  document.getElementById("view-algorithm").classList.toggle("hidden",view!=="algorithm");
  if(view==="grid")renderGrid();
  if(view==="algorithm")renderAlgo();
}

document.querySelectorAll(".nav button").forEach(b=>{ b.onclick=()=>switchView(b.dataset.view); });
document.getElementById("reset-btn").onclick=resetSelection;

initFilters();
syncSelection();
</script>
</body>
</html>
